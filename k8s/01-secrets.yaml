# IMPORTANT: Replace all base64 values before applying.
# Generate with: echo -n "your-value" | base64
#
# Required secrets:
#   POSTGRES_PASSWORD : your PostgreSQL password
#   JWT_SECRET        : min 32-char random string
#   REDIS_PASSWORD    : your Redis password
#   REGISTRY_SERVER   : your ACR login server (e.g. mypollacr.azurecr.io)
#   REGISTRY_USERNAME : ACR username
#   REGISTRY_PASSWORD : ACR password or token
---
apiVersion: v1
kind: Secret
metadata:
  name: polling-secrets
  namespace: polling-platform
type: Opaque
data:
  POSTGRES_PASSWORD: <base64-encoded-password>
  JWT_SECRET: <base64-encoded-jwt-secret>
  REDIS_PASSWORD: <base64-encoded-redis-password>
---
# ACR image pull secret — created via kubectl, not YAML (see README)
# kubectl create secret docker-registry acr-secret \
#   --namespace polling-platform \
#   --docker-server=<ACR_LOGIN_SERVER> \
#   --docker-username=<ACR_USERNAME> \
#   --docker-password=<ACR_PASSWORD>
