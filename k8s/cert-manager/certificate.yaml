apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: polling-tls
  namespace: polling-platform
spec:
  secretName: polling-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - yourdomain.com                          # Replace with your domain
    - www.yourdomain.com                      # Replace with your domain
