apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-service
  namespace: polling-platform
  labels:
    app: realtime-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realtime-service
  template:
    metadata:
      labels:
        app: realtime-service
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: realtime-service
          image: chiradev.azurecr.io/realtime-service:7
          ports:
            - containerPort: 3001
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: polling-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: polling-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: polling-secrets
                  key: REDIS_PASSWORD
            - name: PORT
              value: "3001"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-service-svc
  namespace: polling-platform
  annotations:
    # Enable session affinity so Socket.IO sticky sessions work
    # with multiple replicas
    nginx.org/websocket-services: "realtime-service-svc"
spec:
  selector:
    app: realtime-service
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  ports:
    - port: 3001
      targetPort: 3001
