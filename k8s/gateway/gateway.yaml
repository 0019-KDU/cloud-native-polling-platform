apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: polling-gateway
  namespace: polling-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: nginx
  listeners:
    # HTTP listener — redirects all traffic to HTTPS
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same

    # HTTPS listener — serves all traffic with TLS
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: polling-tls-secret
            kind: Secret
      allowedRoutes:
        namespaces:
          from: Same
