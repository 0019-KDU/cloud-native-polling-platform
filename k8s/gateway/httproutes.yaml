# HTTP → HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
  namespace: polling-platform
spec:
  parentRefs:
    - name: polling-gateway
      sectionName: http
  hostnames:
    - "yourdomain.com"                        # Replace with your domain
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
# auth-service: /api/auth/*
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: polling-platform
spec:
  parentRefs:
    - name: polling-gateway
      sectionName: https
  hostnames:
    - "yourdomain.com"                        # Replace with your domain
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service-svc
          port: 8081
---
